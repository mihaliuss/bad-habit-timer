<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f2f2f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bad Habit Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh;overflow-x:hidden}

.view{display:none}
.view.active{display:block;animation:viewIn .28s cubic-bezier(.34,1.2,.64,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* DASHBOARD */
#v-dash{min-height:100vh;padding:52px 20px 100px;max-width:480px;margin:0 auto}
.dash-title{text-align:center;font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.dash-date{text-align:center;font-size:13px;color:#8e8e93;margin-bottom:32px}

.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.habit-card{background:#7c6af5;border-radius:22px;padding:22px 18px;cursor:pointer;box-shadow:0 4px 20px rgba(26,22,48,.25);transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s ease}
.habit-card:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(26,22,48,.35)}
.habit-card:active{transform:scale(.95);box-shadow:0 2px 10px rgba(26,22,48,.2)}
.card-emoji{font-size:30px;margin-bottom:12px;display:block}
.card-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.card-days{font-size:34px;font-weight:700;color:#fff;line-height:1}
.card-unit{font-size:11px;color:rgba(255,255,255,.75);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.card-bar-bg{height:3px;background:rgba(255,255,255,.25);border-radius:2px;margin-bottom:10px;overflow:hidden}
.card-bar{height:3px;background:rgba(255,255,255,.5);border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.card-status{font-size:12px;color:rgba(255,255,255,.8);font-weight:500}
.card-status.fire{color:#f5a623}
.card-status.trophy{color:#f0c040}

.btn-add{width:100%;padding:16px;border-radius:16px;border:1.5px dashed rgba(0,0,0,.15);background:transparent;color:#8e8e93;font-size:15px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .22s ease}
.btn-add:hover{background:rgba(124,106,245,.08);color:#7c6af5;border-color:rgba(124,106,245,.3)}
.btn-add:active{transform:scale(.98)}

/* DETAIL */
#v-detail{min-height:100vh;padding:0 0 80px}
.detail-wrap{max-width:480px;margin:0 auto}
.detail-top{padding:24px 20px 0}
.btn-back{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid rgba(0,0,0,.09);color:#1c1c1e;font-size:14px;font-family:'Inter',sans-serif;padding:9px 14px;border-radius:12px;cursor:pointer;font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .2s ease}
.btn-back:hover{background:#f0f0f5;transform:translateX(-2px)}
.btn-back:active{transform:scale(.96)}

.detail-body{padding:20px 20px 0}
.detail-name{text-align:center;font-size:24px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.detail-sub{text-align:center;font-size:13px;color:#8e8e93;margin-bottom:24px}

/* TIMER */
.timer-grid{display:flex;align-items:flex-start;justify-content:center;gap:2px;margin-bottom:28px}
.t-box{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:72px}
.t-num{font-size:40px;font-weight:700;color:#7c6af5;font-variant-numeric:tabular-nums;line-height:1}
.t-lbl{font-size:10px;color:#8e8e93;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.t-sep{font-size:34px;font-weight:700;color:rgba(124,106,245,.35);margin-top:3px;padding:0 2px}

/* RING */
.ring-wrap{display:flex;justify-content:center;margin-bottom:16px}
.status-wrap{text-align:center;margin-bottom:20px}
.status-badge{display:inline-block;padding:7px 20px;border-radius:20px;font-size:14px;font-weight:600;background:rgba(124,106,245,.12);color:#7c6af5}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.stat{background:rgba(124,106,245,.1);border-radius:16px;padding:14px 10px;text-align:center;border:1px solid rgba(124,106,245,.18)}
.stat-val{font-size:22px;font-weight:700;color:#1c1c1e}
.stat-lbl{font-size:10px;color:#8e8e93;text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-top:4px}

.start-info{text-align:center;font-size:13px;color:#8e8e93;margin-bottom:24px}
.start-info strong{color:#1c1c1e;font-weight:500}

.sec-title{font-size:11px;color:#8e8e93;text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:10px}

.ms-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.ms-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:14px;background:#fff;border:1px solid rgba(0,0,0,.06);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.ms-item.done{background:rgba(124,106,245,.08);border-color:rgba(124,106,245,.18)}
.ms-item.current{background:rgba(124,106,245,.13);border:1.5px solid rgba(124,106,245,.38)}
.ms-dot{width:9px;height:9px;border-radius:50%;background:#d1d1d6;flex-shrink:0}
.ms-item.done .ms-dot{background:#7c6af5}
.ms-item.current .ms-dot{background:#7c6af5;box-shadow:0 0 0 3px rgba(124,106,245,.2)}
.ms-text{font-size:14px;color:#8e8e93;font-weight:500}
.ms-item.done .ms-text{color:#7c6af5}
.ms-item.current .ms-text{color:#1c1c1e;font-weight:600}
.ms-right{margin-left:auto;font-size:12px;color:#c7c7cc;font-weight:500}
.ms-item.done .ms-right{color:#7c6af5}
.ms-item.current .ms-right{color:#8e8e93}

.history-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.history-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-radius:14px;border:1px solid rgba(0,0,0,.06);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.h-dot{width:9px;height:9px;border-radius:50%;background:#ff3b30;flex-shrink:0}
.h-dot.green{background:#34c759}
.h-date{font-size:13px;font-weight:500;color:#1c1c1e}
.h-days{font-size:12px;color:#8e8e93;margin-top:1px}

.btn-relapse{width:100%;padding:14px;border-radius:14px;border:1.5px solid rgba(255,59,48,.2);background:rgba(255,59,48,.05);color:rgba(255,59,48,.8);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .22s ease}
.btn-relapse:hover{background:rgba(255,59,48,.1);border-color:rgba(255,59,48,.4);color:#ff3b30}
.btn-relapse:active{transform:scale(.97)}

/* FAB */
.fab{position:fixed;bottom:28px;right:24px;width:56px;height:56px;border-radius:18px;background:#7c6af5;border:none;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;font-family:'Inter',sans-serif;box-shadow:0 8px 24px rgba(124,106,245,.38);transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.fab:hover{transform:scale(1.1);box-shadow:0 12px 32px rgba(124,106,245,.48)}
.fab:active{transform:scale(.93)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:28px 28px 0 0;padding:20px 20px 44px;width:100%;max-width:480px;max-height:96vh;overflow:hidden;animation:slideUp .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:#d1d1d6;border-radius:2px;margin:0 auto 20px}
.modal h2{font-size:19px;font-weight:700;margin-bottom:16px;letter-spacing:-.2px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#8e8e93;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.field input[type=text]{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid rgba(0,0,0,.1);background:#f8f8fc;color:#1c1c1e;font-size:16px;font-family:'Inter',sans-serif;font-weight:500;outline:none;transition:all .2s}
.field input[type=text]:focus{border-color:#7c6af5;background:rgba(124,106,245,.04)}
.field input[type=text]::placeholder{color:#c7c7cc}

.emoji-grid{display:flex;flex-wrap:wrap;gap:6px}
.e-btn{width:38px;height:38px;border-radius:10px;border:1.5px solid transparent;background:#f2f2f7;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s cubic-bezier(.34,1.56,.64,1)}
.e-btn:hover{background:rgba(124,106,245,.1);transform:scale(1.12)}
.e-btn:active{transform:scale(.95)}
.e-btn.sel{border-color:#7c6af5;background:rgba(124,106,245,.12);transform:scale(1.12)}

.dp-wrap{background:#f8f8fc;border:1.5px solid rgba(0,0,0,.08);border-radius:12px;padding:12px}
.dp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dp-nav-btn{background:rgba(0,0,0,.06);border:none;color:#1c1c1e;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Inter',sans-serif}
.dp-nav-btn:hover{background:rgba(124,106,245,.15)}
.dp-nav-btn:active{transform:scale(.9)}
.dp-month{font-size:13px;font-weight:600}
.dp-wds{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.dp-wd{font-size:10px;color:#8e8e93;text-align:center;padding:2px 0;font-weight:700}
.dp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-d{font-size:12px;text-align:center;padding:6px 2px;border-radius:7px;cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;font-weight:500;color:#1c1c1e;transition:all .15s;width:100%}
.dp-d:hover:not(:disabled){background:rgba(124,106,245,.1)}
.dp-d.today{color:#7c6af5;font-weight:700}
.dp-d.sel{background:#7c6af5!important;color:#fff!important;font-weight:700}
.dp-d.other{color:#c7c7cc}
.dp-d:disabled{cursor:default}

.num-row{display:flex;align-items:center;background:#f8f8fc;border:1.5px solid rgba(0,0,0,.08);border-radius:12px;overflow:hidden;transition:border-color .2s}
.num-row:focus-within{border-color:#7c6af5}
.n-btn{width:44px;height:44px;border:none;background:transparent;color:#8e8e93;font-size:22px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;flex-shrink:0}
.n-btn:hover{background:rgba(124,106,245,.08);color:#7c6af5}
.n-btn:active{transform:scale(.9)}
.n-val{flex:1;border:none;background:transparent;text-align:center;font-size:18px;font-weight:700;color:#1c1c1e;font-family:'Inter',sans-serif;outline:none;-moz-appearance:textfield;min-width:0}
.n-val::-webkit-inner-spin-button,.n-val::-webkit-outer-spin-button{-webkit-appearance:none}

.modal-btns{display:flex;gap:10px;margin-top:16px}
.btn-cancel{flex:1;padding:13px;border-radius:14px;border:1.5px solid rgba(0,0,0,.1);background:#f2f2f7;color:#8e8e93;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .2s}
.btn-cancel:hover{background:#e8e8ef}
.btn-cancel:active{transform:scale(.97)}
.btn-save{flex:2;padding:13px;border-radius:14px;border:none;background:#7c6af5;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 4px 16px rgba(124,106,245,.32);transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.btn-save:hover{background:#8f7ef7;box-shadow:0 6px 20px rgba(124,106,245,.42)}
.btn-save:active{transform:scale(.97)}

/* CONFIRM */
.confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.confirm-bg.open{display:flex}
.confirm-box{background:#fff;border-radius:24px;padding:28px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:popIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.confirm-box h3{font-size:18px;font-weight:700;margin-bottom:8px}
.confirm-box p{font-size:14px;color:#8e8e93;margin-bottom:24px;line-height:1.6}
.confirm-btns{display:flex;gap:10px}
.c-no{flex:1;padding:13px;border-radius:12px;border:1.5px solid rgba(0,0,0,.1);background:#f2f2f7;color:#8e8e93;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .2s}
.c-no:active{transform:scale(.97)}
.c-yes{flex:1;padding:13px;border-radius:12px;border:none;background:#ff3b30;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.c-yes:hover{background:#ff2d20}
.c-yes:active{transform:scale(.97)}
</style>
</head>
<body>

<!-- DASHBOARD -->
<div id="v-dash" class="view active">
  <div style="max-width:480px;margin:0 auto;padding:52px 20px 100px">
    <h1 class="dash-title">Bad Habit Timer</h1>
    <p class="dash-date" id="dash-date"></p>
    <div class="cards-grid" id="cards-grid"></div>
    <button class="btn-add" onclick="openModal()">+ Добавить привычку</button>
  </div>
</div>

<!-- DETAIL -->
<div id="v-detail" class="view">
  <div class="detail-wrap">
    <div class="detail-top">
      <button class="btn-back" onclick="showDash()">← Назад</button>
    </div>
    <div class="detail-body">
      <div class="detail-name" id="d-name"></div>
      <div class="detail-sub" id="d-sub"></div>

      <div class="timer-grid">
        <div class="t-box"><span class="t-num" id="t-d">00</span><span class="t-lbl">Дни</span></div>
        <div class="t-sep">:</div>
        <div class="t-box"><span class="t-num" id="t-h">00</span><span class="t-lbl">Часы</span></div>
        <div class="t-sep">:</div>
        <div class="t-box"><span class="t-num" id="t-m">00</span><span class="t-lbl">Мин</span></div>
        <div class="t-sep">:</div>
        <div class="t-box"><span class="t-num" id="t-s">00</span><span class="t-lbl">Сек</span></div>
      </div>

      <div class="ring-wrap">
        <svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <circle cx="110" cy="110" r="92" fill="none" stroke="rgba(0,0,0,.07)" stroke-width="14"/>
          <circle cx="110" cy="110" r="92" fill="none" stroke="rgba(124,106,245,.12)" stroke-width="14"
            stroke-dasharray="578" transform="rotate(-90 110 110)"/>
          <circle id="ring-p" cx="110" cy="110" r="92" fill="none" stroke="#7c6af5" stroke-width="14"
            stroke-linecap="round" stroke-dasharray="578" stroke-dashoffset="578"
            transform="rotate(-90 110 110)" style="transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)"/>
          <text x="110" y="102" text-anchor="middle" fill="#8e8e93" font-size="13" font-weight="500" font-family="Inter,sans-serif">Текущая цель</text>
          <text x="110" y="128" text-anchor="middle" fill="#7c6af5" font-size="26" font-weight="700" font-family="Inter,sans-serif" id="r-goal">—</text>
        </svg>
      </div>

      <div class="status-wrap"><span class="status-badge" id="d-status"></span></div>

      <div class="stats">
        <div class="stat"><div class="stat-val" id="s-days">—</div><div class="stat-lbl">Дней</div></div>
        <div class="stat"><div class="stat-val" id="s-left">—</div><div class="stat-lbl">Осталось</div></div>
        <div class="stat"><div class="stat-val" id="s-rec">—</div><div class="stat-lbl">Рекорд</div></div>
      </div>

      <div class="start-info">Начало: <strong id="d-start"></strong></div>

      <div style="margin-top:24px" class="sec-title">Цели</div>
      <div class="ms-list" id="ms-list"></div>

      <div class="sec-title">История</div>
      <div class="history-list" id="h-list"></div>

      <button class="btn-relapse" onclick="confirmRelapse()">Рецидив</button>
    </div>
  </div>
</div>

<button class="fab" id="fab-btn" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="bgClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-handle"></div>
    <h2>Новая привычка</h2>
    <div class="field">
      <label>Название</label>
      <input type="text" id="f-name" placeholder="Например: Курение" oninput="autoEmoji()"/>
    </div>
    <div class="field">
      <label>Иконка</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
    <div class="field">
      <label>Дата начала</label>
      <div class="dp-wrap">
        <div class="dp-nav">
          <button class="dp-nav-btn" onclick="dpPrev()">‹</button>
          <span class="dp-month" id="dp-label"></span>
          <button class="dp-nav-btn" onclick="dpNext()">›</button>
        </div>
        <div class="dp-wds">
          <div class="dp-wd">Пн</div><div class="dp-wd">Вт</div><div class="dp-wd">Ср</div>
          <div class="dp-wd">Чт</div><div class="dp-wd">Пт</div><div class="dp-wd">Сб</div><div class="dp-wd">Вс</div>
        </div>
        <div class="dp-days" id="dp-days"></div>
      </div>
    </div>
    <div class="field">
      <label>Рекорд (дней)</label>
      <div class="num-row">
        <button class="n-btn" onclick="numCh(-1)">−</button>
        <input class="n-val" id="f-rec" type="number" value="0" min="0"/>
        <button class="n-btn" onclick="numCh(1)">+</button>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveHabit()">Сохранить</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-bg" id="confirm">
  <div class="confirm-box">
    <h3>Рецидив?</h3>
    <p>Счётчик сбросится до нуля. Рекорд и история сохранятся.</p>
    <div class="confirm-btns">
      <button class="c-no" onclick="closeConfirm()">Нет</button>
      <button class="c-yes" onclick="doRelapse()">Да</button>
    </div>
  </div>
</div>

<script>
const ML=[3,7,14,30,90,180,365];
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const EMOJIS=['🚬','🍺','🍬','📱','☕','🍔','💊','🎮','😴','🏃','🌿','✨','🎰','💸','😤','🧁','🍷','📺'];
const EMAP=[
  [['кур','сигар','табак'],'🚬'],
  [['алко','пив','вин','водк','ром','виски'],'🍺'],
  [['сахар','слад','шокол','конфет','торт'],'🍬'],
  [['соцсет','инстаграм','тикток','телефон','смартфон'],'📱'],
  [['кофе'],'☕'],
  [['фастфуд','бургер'],'🍔'],
  [['нарко','таблет'],'💊'],
  [['игр','казино','азарт','ставк'],'🎰'],
  [['сон','просып','режим'],'😴'],
  [['бег','спорт','трениров'],'🏃'],
  [['деньг','трат','шопинг'],'💸'],
  [['телевиз','сериал','ютуб'],'📺'],
];

let habits=JSON.parse(localStorage.getItem('bht6')||'[]');
let cur=0,timerInt=null,dpY,dpM,dpSel,selE='🌿';

function pad(n,l=2){return String(Math.floor(n)).padStart(l,'0')}
function dw(n){if(n%10===1&&n%100!==11)return'день';if([2,3,4].includes(n%10)&&![12,13,14].includes(n%100))return'дня';return'дней'}
function df(s){return new Date(s+'T00:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})}
function dayCount(s){const a=new Date(s+'T00:00:00');const b=new Date();b.setHours(0,0,0,0);return Math.max(0,Math.round((b-a)/86400000))}
function getGoal(d){for(const m of ML)if(d<m)return m;return ML[ML.length-1]}

function autoEmoji(){
  const n=document.getElementById('f-name').value.toLowerCase();
  for(const[keys,e]of EMAP){if(keys.some(k=>n.includes(k))){selE=e;renderEG();return;}}
}

function renderEG(){
  const g=document.getElementById('emoji-grid');g.innerHTML='';
  EMOJIS.forEach(e=>{
    const b=document.createElement('button');
    b.className='e-btn'+(e===selE?' sel':'');
    b.textContent=e;b.type='button';
    b.onclick=()=>{selE=e;renderEG();};
    g.appendChild(b);
  });
}

function showDash(){
  clearInterval(timerInt);timerInt=null;
  document.getElementById('v-detail').classList.remove('active');
  document.getElementById('v-dash').classList.add('active');
  document.getElementById('fab-btn').style.display='flex';
  renderDash();
}

function showDetail(i){
  cur=i;
  document.getElementById('v-dash').classList.remove('active');
  document.getElementById('v-detail').classList.add('active');
  document.getElementById('fab-btn').style.display='none';
  renderDetail();
  startTimer();
}

function renderDash(){
  document.getElementById('dash-date').textContent=new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  const g=document.getElementById('cards-grid');g.innerHTML='';
  if(!habits.length){
    g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px 0 20px"><div style="font-size:50px;margin-bottom:12px">🌱</div><p style="color:#8e8e93;font-size:14px;line-height:1.6">Добавь первую привычку</p></div>';
    return;
  }
  habits.forEach((h,i)=>{
    const d=dayCount(h.startDate),gl=getGoal(d),pct=Math.min(100,Math.round(d/gl*100));
    let st='💪 Держишься',sc='';
    if(d>=gl){st='🏆 Цель!';sc='trophy';}
    else if(d>0&&d>=(h.record||0)){st='🔥 Рекорд!';sc='fire';}
    const c=document.createElement('div');c.className='habit-card';c.onclick=()=>showDetail(i);
    c.innerHTML=`<span class="card-emoji">${h.emoji||'🌿'}</span><div class="card-name">${h.name}</div><div class="card-days">${pad(d)}</div><div class="card-unit">${dw(d)}</div><div class="card-bar-bg"><div class="card-bar" style="width:${pct}%"></div></div><div class="card-status ${sc}">${st}</div>`;
    g.appendChild(c);
  });
}

function renderDetail(){
  const h=habits[cur];
  const d=dayCount(h.startDate),gl=getGoal(d),left=Math.max(0,gl-d),rec=Math.max(h.record||0,d),pct=Math.min(1,d/gl);
  document.getElementById('d-name').textContent=(h.emoji||'🌿')+' '+h.name;
  document.getElementById('d-sub').textContent='Попытка '+(h.attempt||1);
  document.getElementById('r-goal').textContent=gl+' дн.';
  document.getElementById('s-days').textContent=d;
  document.getElementById('s-left').textContent=left;
  document.getElementById('s-rec').textContent=rec;
  document.getElementById('d-start').textContent=df(h.startDate);
  let st='💪 Держишься';
  if(d>=gl)st='🏆 Цель достигнута!';
  else if(d>0&&d>=(h.record||0))st='🔥 Новый рекорд!';
  document.getElementById('d-status').textContent=st;
  setTimeout(()=>{document.getElementById('ring-p').style.strokeDashoffset=578*(1-pct);},80);

  const ml=document.getElementById('ms-list');ml.innerHTML='';
  ML.forEach(m=>{
    const done=d>=m,isCur=!done&&getGoal(d)===m;
    const el=document.createElement('div');
    el.className='ms-item'+(done?' done':isCur?' current':'');
    const r=done?'✓':(isCur?`осталось ${m-d} д.`:`через ${m-d} д.`);
    el.innerHTML=`<div class="ms-dot"></div><span class="ms-text">${m} дней</span><span class="ms-right">${r}</span>`;
    ml.appendChild(el);
  });

  const hl=document.getElementById('h-list');hl.innerHTML='';
  const si=document.createElement('div');si.className='history-item';
  si.innerHTML=`<div class="h-dot green"></div><div><div class="h-date">Начало — ${df(h.startDate)}</div><div class="h-days">Текущая серия: ${d} ${dw(d)}</div></div>`;
  hl.appendChild(si);
  if(h.relapses&&h.relapses.length){
    [...h.relapses].reverse().forEach(r=>{
      const el=document.createElement('div');el.className='history-item';
      el.innerHTML=`<div class="h-dot"></div><div><div class="h-date">Рецидив — ${df(r.date)}</div><div class="h-days">Продержался: ${r.days} ${dw(r.days)}</div></div>`;
      hl.appendChild(el);
    });
  }
}

function startTimer(){
  clearInterval(timerInt);timerInt=null;
  tick();
  timerInt=setInterval(tick,1000);
}

function tick(){
  if(!habits[cur])return;
  const start=new Date(habits[cur].startDate+'T00:00:00');
  const diff=Math.max(0,Date.now()-start.getTime());
  const s=Math.floor(diff/1000);
  document.getElementById('t-d').textContent=pad(Math.floor(s/86400));
  document.getElementById('t-h').textContent=pad(Math.floor((s%86400)/3600));
  document.getElementById('t-m').textContent=pad(Math.floor((s%3600)/60));
  document.getElementById('t-s').textContent=pad(s%60);
}

function initDp(){
  const n=new Date();dpY=n.getFullYear();dpM=n.getMonth();dpSel=n.toISOString().slice(0,10);renderDp();
}
function dpPrev(){dpM--;if(dpM<0){dpM=11;dpY--;}renderDp();}
function dpNext(){dpM++;if(dpM>11){dpM=0;dpY++;}renderDp();}
function renderDp(){
  document.getElementById('dp-label').textContent=MONTHS[dpM]+' '+dpY;
  const c=document.getElementById('dp-days');c.innerHTML='';
  const first=new Date(dpY,dpM,1).getDay(),off=first===0?6:first-1;
  const dim=new Date(dpY,dpM+1,0).getDate();
  const today=new Date().toISOString().slice(0,10);
  for(let i=0;i<off;i++){const b=document.createElement('button');b.className='dp-d other';b.disabled=true;c.appendChild(b);}
  for(let d=1;d<=dim;d++){
    const ds=`${dpY}-${pad(dpM+1)}-${pad(d)}`;
    const b=document.createElement('button');
    b.className='dp-d'+(ds===today?' today':'')+(ds===dpSel?' sel':'');
    b.textContent=d;b.onclick=()=>{dpSel=ds;renderDp();};
    c.appendChild(b);
  }
}

function numCh(d){
  const e=document.getElementById('f-rec');
  e.value=Math.max(0,(parseInt(e.value)||0)+d);
}

function openModal(){
  selE='🌿';
  document.getElementById('f-name').value='';
  document.getElementById('f-rec').value='0';
  renderEG();initDp();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function bgClick(e){if(e.target===document.getElementById('modal'))closeModal();}

function saveHabit(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').focus();return;}
  const rec=parseInt(document.getElementById('f-rec').value)||0;
  habits.push({name,emoji:selE,startDate:dpSel,record:rec,attempt:1,relapses:[]});
  save();closeModal();renderDash();
}

function confirmRelapse(){document.getElementById('confirm').classList.add('open');}
function closeConfirm(){document.getElementById('confirm').classList.remove('open');}

function doRelapse(){
  const h=habits[cur];
  const d=dayCount(h.startDate);
  if(d>(h.record||0))h.record=d;
  if(!h.relapses)h.relapses=[];
  h.relapses.push({date:new Date().toISOString().slice(0,10),days:d});
  h.attempt=(h.attempt||1)+1;
  h.startDate=new Date().toISOString().slice(0,10);
  save();closeConfirm();
  renderDetail();
  clearInterval(timerInt);timerInt=null;
  tick();
  timerInt=setInterval(tick,1000);
}

function save(){localStorage.setItem('bht6',JSON.stringify(habits));}

if(!habits.length){
  habits=[{name:'Курение',emoji:'🚬',startDate:'2026-01-13',record:115,attempt:1,relapses:[]}];
  save();
}
renderDash();
</script>
</body>
</html>
